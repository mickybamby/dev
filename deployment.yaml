apiVersion: apps/v1
kind: Deployment
metadata:
  name: mike-python-deployment
  labels:
    app: mickybamby/app-python
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mickybamby/app-python
  template:
    metadata:
      labels:
        app: mickybamby/app-python
    spec:
      containers:
      - name: mickybamby/app-python
        image: mickybamby/app-python:v1
        ports:
        - containerPort: 80
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
          requests:
            memory: "64Mi"
            cpu: "250m"