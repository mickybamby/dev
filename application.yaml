apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-python-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mickybamby/dev.git
    targetRevision: HEAD
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: my-python-app-prod 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true  # Automatically creates the destination namespace
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5 # Number of retries on failed sync
      backoff:
        duration: 5s 
        factor: 2 
        maxDuration: 3m
